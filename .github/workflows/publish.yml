name: Publish Libraries to Maven Central

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Publish screen libraries (annotations, compiler)
        run: ./gradlew :screen-annotations:publishAllPublicationsToMavenCentralRepository :screen-compiler:publishAllPublicationsToMavenCentralRepository

      - name: Publish viewbinding-compiler
        run: ./gradlew :viewbinding-compiler:publishAllPublicationsToMavenCentralRepository

      - name: Publish screen-gradle-plugin
        working-directory: screen-gradle-plugin
        run: ../gradlew publishAllPublicationsToMavenCentralRepository

      - name: Publish viewbinding-gradle-plugin
        working-directory: viewbinding-gradle-plugin
        run: ../gradlew publishAllPublicationsToMavenCentralRepository

  release:
    name: Build & Release IDEA Plugins
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build compiler JARs
        run: ./gradlew :screen-compiler:jar :viewbinding-compiler:jar

      - name: Copy JARs into IDEA plugin libs
        run: |
          cp screen-compiler/build/libs/screen-compiler.jar screen-idea-plugin/libs/screen-compiler.jar
          cp viewbinding-compiler/build/libs/viewbinding-compiler.jar viewbinding-idea-plugin/libs/viewbinding-compiler.jar

      - name: Build screen-idea-plugin
        working-directory: screen-idea-plugin
        run: ./gradlew buildPlugin

      - name: Build viewbinding-idea-plugin
        working-directory: viewbinding-idea-plugin
        run: ./gradlew buildPlugin

      - name: Upload IDEA plugins to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            screen-idea-plugin/build/distributions/*.zip
            viewbinding-idea-plugin/build/distributions/*.zip
